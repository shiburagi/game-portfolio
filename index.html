    <style>
        :root {
            --bg-color: #0B0C10;
            --panel-bg: rgba(11, 12, 16, 0.85);
            --primary: #66FCF1;
            --primary-dim: rgba(102, 252, 241, 0.2);
            --secondary: #45A29E;
            --text-main: #C5C6C7;
            --text-muted: #8c8c8e;
            --alert: #ff4655;
        }

        body {
            font-family: 'Share Tech Mono', monospace;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Tactical Canvas Background */
        #tactical-map {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        /* CRT/Scanline Overlay */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.1) 50%,
                rgba(0,0,0,0.1)
            );
            background-size: 100% 4px;
            z-index: 50;
            pointer-events: none;
            opacity: 0.3;
        }

        /* UI Panels */
        .ui-panel {
            background: var(--panel-bg);
            border: 1px solid var(--secondary);
            backdrop-filter: blur(4px);
            position: relative;
        }

        /* Angled corners (Strategy game aesthetic) */
        .ui-panel::before {
            content: '';
            position: absolute;
            top: -1px; left: -1px;
            width: 10px; height: 10px;
            border-top: 2px solid var(--primary);
            border-left: 2px solid var(--primary);
        }
        .ui-panel::after {
            content: '';
            position: absolute;
            bottom: -1px; right: -1px;
            width: 10px; height: 10px;
            border-bottom: 2px solid var(--primary);
            border-right: 2px solid var(--primary);
        }

        /* Nav Buttons */
        .nav-btn {
            display: flex;
            align-items: center;
            width: 100%;
            text-align: left;
            padding: 0.75rem 1rem;
            color: var(--text-main);
            border: 1px solid transparent;
            border-left: 3px solid var(--secondary);
            background: transparent;
            transition: all 0.2s ease;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        /* Content Area Custom Scrollbar */
        .content-scroll {
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--secondary) transparent;
            /* Safe area for mobile home bars */
            padding-bottom: env(safe-area-inset-bottom, 1rem); 
        }
        .content-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .content-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .content-scroll::-webkit-scrollbar-thumb {
            background-color: var(--secondary);
        }

        /* Hide scrollbar for mobile nav */
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        /* Desktop specific Nav Hover */
        @media (min-width: 768px) {
            .nav-btn:hover {
                background: var(--primary-dim);
                border-left-color: var(--primary);
                color: var(--primary);
                padding-left: 1.5rem;
            }
            .nav-btn.active {
                background: var(--primary-dim);
                border: 1px solid var(--primary);
                border-left: 4px solid var(--primary);
                color: var(--primary);
            }
        }

        /* Mobile specific Nav layout */
        @media (max-width: 767px) {
            .nav-btn {
                width: auto;
                border-left: none;
                border-bottom: 2px solid var(--secondary);
                padding: 0.5rem 1rem;
                flex-shrink: 0;
            }
            .nav-btn.active {
                background: var(--primary-dim);
                border-bottom: 3px solid var(--primary);
                color: var(--primary);
            }
        }

        /* Glitch text effect for headers */
        .glitch-text {
            color: var(--primary);
            text-shadow: 0 0 5px var(--primary-dim);
        }

        /* Data row hover */
        .data-row {
            border-left: 2px solid transparent;
            transition: all 0.2s;
        }
        @media (hover: hover) {
            .data-row:hover {
                border-left: 2px solid var(--primary);
                background: rgba(102, 252, 241, 0.05);
            }
        }

        /* Loading animation for content switch */
        @keyframes typing {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-enter {
            animation: typing 0.3s ease-out forwards;
        }

        /* Status Blinker */
        .blinker {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--primary);
            animation: blink 1s step-end infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>

        // --- UI LOGIC ---
        function loadModule(moduleId, btnElement) {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            if(btnElement) {
                btnElement.classList.add('active');
                // Scroll horizontal nav to active item on mobile
                btnElement.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }

            const data = database[moduleId];
            const display = document.getElementById('display-screen');
            const title = document.getElementById('module-title');
            const idTag = document.getElementById('module-id');

            title.style.opacity = '0.5';
            setTimeout(() => {
                title.textContent = data.title;
                idTag.textContent = 'ID: ' + data.id;
                display.innerHTML = data.html;
                title.style.opacity = '1';
                display.scrollTop = 0; // Reset scroll on load
            }, 150);
        }

        window.onload = () => {
            loadModule('overview', document.querySelector('.nav-btn'));
            initTacticalMap();
        };

        // --- CANVAS BACKGROUND LOGIC ---
        function initTacticalMap() {
            const canvas = document.getElementById('tactical-map');
            const ctx = canvas.getContext('2d');
            let width, height;

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            // Slightly smaller hexes for mobile feel
            const isMobile = window.innerWidth < 768;
            const hexRadius = isMobile ? 30 : 40; 
            const hexHeight = Math.sqrt(3) * hexRadius;
            const hexWidth = 2 * hexRadius;
            let offset = 0;

            function drawHex(x, y, opacity = 0.1) {
                ctx.beginPath();
                for (let i = 0; i < 6; i++) {
                    const angle_deg = 60 * i - 30;
                    const angle_rad = Math.PI / 180 * angle_deg;
                    const px = x + hexRadius * Math.cos(angle_rad);
                    const py = y + hexRadius * Math.sin(angle_rad);
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.strokeStyle = `rgba(69, 162, 158, ${opacity})`;
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            const blips = Array.from({length: isMobile ? 8 : 15}, () => ({
                x: Math.random() * width,
                y: Math.random() * height,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5,
                size: Math.random() * 2 + 1,
                pulse: Math.random() * Math.PI
            }));

            function animate() {
                ctx.clearRect(0, 0, width, height);
                
                offset += 0.2;
                if(offset > hexHeight) offset = 0;

                for (let x = 0; x < width + hexWidth; x += hexWidth * 0.75) {
                    for (let y = -hexHeight; y < height + hexHeight; y += hexHeight) {
                        const isOffset = (Math.round(x / (hexWidth * 0.75)) % 2 !== 0);
                        const actualY = y + (isOffset ? hexHeight / 2 : 0) + offset;
                        
                        const distToCenter = Math.hypot(x - width/2, actualY - height/2);
                        const maxDist = Math.max(width, height) / 1.5;
                        const opacity = Math.max(0.02, 0.15 - (distToCenter / maxDist) * 0.15);
                        
                        drawHex(x, actualY, opacity);
                    }
                }

                blips.forEach(blip => {
                    blip.x += blip.vx;
                    blip.y += blip.vy;
                    blip.pulse += 0.05;

                    if(blip.x < 0) blip.x = width;
                    if(blip.x > width) blip.x = 0;
                    if(blip.y < 0) blip.y = height;
                    if(blip.y > height) blip.y = 0;

                    const blipOpacity = (Math.sin(blip.pulse) + 1) / 2 * 0.5 + 0.1;
                    ctx.beginPath();
                    ctx.arc(blip.x, blip.y, blip.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(102, 252, 241, ${blipOpacity})`;
                    ctx.fill();
                    
                    blips.forEach(other => {
                        const dist = Math.hypot(blip.x - other.x, blip.y - other.y);
                        if(dist < 100 && dist > 0) {
                            ctx.beginPath();
                            ctx.moveTo(blip.x, blip.y);
                            ctx.lineTo(other.x, other.y);
                            ctx.strokeStyle = `rgba(102, 252, 241, ${0.1 - (dist/100)*0.1})`;
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    });
                });

                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
